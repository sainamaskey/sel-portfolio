<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07070d" />
    <title>Selene Mulmi — UI/UX Designer</title>
    <meta
      name="description"
      content="Portfolio of Selene Mulmi — UI/UX Designer & CSIT student bridging aesthetics and functional code."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
              display: ["Space Grotesk", "Inter", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            colors: {
              ink: {
                950: "#07070d",
                900: "#0b0b14",
                800: "#11111c",
                700: "#1a1a28",
                600: "#262638",
                500: "#3a3a52",
                400: "#6b6b85",
                300: "#9a9aae",
                200: "#cdcdd6",
                100: "#ededf2",
              },
              brand: {
                indigo: "#6366f1",
                violet: "#a855f7",
                fuchsia: "#d946ef",
                cyan: "#22d3ee",
              },
            },
          },
        },
      };
    </script>
    <style>
      :root {
        --accent-1: #818cf8;
        --accent-2: #c084fc;
        --accent-3: #22d3ee;
      }
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "Inter", system-ui, sans-serif;
        background-color: #07070d;
        color: #ededf2;
        overflow-x: hidden;
      }
      /* Animated background orbs */
      .bg-orb {
        position: absolute;
        border-radius: 9999px;
        filter: blur(120px);
        opacity: 0.45;
        pointer-events: none;
        z-index: 0;
      }
      /* Subtle grid texture */
      .grid-bg {
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 56px 56px;
        mask-image: radial-gradient(ellipse at top, black 30%, transparent 75%);
        -webkit-mask-image: radial-gradient(
          ellipse at top,
          black 30%,
          transparent 75%
        );
      }
      /* Glassmorphism card */
      .glass {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.04),
          rgba(255, 255, 255, 0.015)
        );
        backdrop-filter: blur(14px) saturate(140%);
        -webkit-backdrop-filter: blur(14px) saturate(140%);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .glass-strong {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.07),
          rgba(255, 255, 255, 0.025)
        );
        backdrop-filter: blur(20px) saturate(160%);
        -webkit-backdrop-filter: blur(20px) saturate(160%);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .gradient-text {
        background: linear-gradient(
          120deg,
          #c4b5fd 0%,
          #a78bfa 30%,
          #f0abfc 60%,
          #67e8f9 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .gradient-border {
        position: relative;
      }
      .gradient-border::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(
          135deg,
          rgba(129, 140, 248, 0.6),
          rgba(192, 132, 252, 0.3),
          transparent 60%
        );
        -webkit-mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
      /* Reveal-on-scroll */
      .reveal {
        opacity: 0;
        transform: translateY(28px);
        transition:
          opacity 0.9s cubic-bezier(0.2, 0.7, 0.2, 1),
          transform 0.9s cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      .reveal.in {
        opacity: 1;
        transform: none;
      }
      .reveal-d1 {
        transition-delay: 0.08s;
      }
      .reveal-d2 {
        transition-delay: 0.18s;
      }
      .reveal-d3 {
        transition-delay: 0.28s;
      }
      /* Hero name animation */
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-14px);
        }
      }
      .float-slow {
        animation: float 9s ease-in-out infinite;
      }
      @keyframes blink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0;
        }
      }
      .caret {
        display: inline-block;
        width: 3px;
        height: 0.9em;
        background: linear-gradient(180deg, #818cf8, #c084fc);
        transform: translateY(2px);
        margin-left: 6px;
        animation: blink 1s steps(1) infinite;
      }
      /* Project hover */
      .project-card .project-overlay {
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      .project-card:hover .project-overlay {
        opacity: 1;
      }
      .project-card .project-art {
        transition: transform 0.6s cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      .project-card:hover .project-art {
        transform: scale(1.06);
      }
      /* Marquee */
      @keyframes marquee {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }
      .marquee-track {
        animation: marquee 28s linear infinite;
      }
      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #07070d;
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(#3a3a52, #1a1a28);
        border-radius: 8px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(#6366f1, #a855f7);
      }
      /* Selection */
      ::selection {
        background: rgba(168, 85, 247, 0.35);
        color: #fff;
      }
      /* Lucide icons sizing reset */
      [data-lucide] {
        width: 1em;
        height: 1em;
        stroke-width: 1.6;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <script type="text/babel" data-presets="react">
      const { useEffect, useRef, useState } = React;

      // ---------- Icon helper (Lucide via UMD) ----------
      function Icon({ name, className = "" }) {
        const ref = useRef(null);
        useEffect(() => {
          if (window.lucide && ref.current) {
            ref.current.innerHTML = "";
            const el = document.createElement("i");
            el.setAttribute("data-lucide", name);
            ref.current.appendChild(el);
            window.lucide.createIcons({ attrs: {} });
          }
        }, [name]);
        return <span ref={ref} className={"inline-flex items-center justify-center " + className} aria-hidden="true" />;
      }

      // ---------- Reveal-on-scroll hook ----------
      function useReveal() {
        useEffect(() => {
          const els = document.querySelectorAll(".reveal");
          const io = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (e.isIntersecting) {
                  e.target.classList.add("in");
                  io.unobserve(e.target);
                }
              });
            },
            { threshold: 0.12, rootMargin: "0px 0px -40px 0px" }
          );
          els.forEach((el) => io.observe(el));
          return () => io.disconnect();
        }, []);
      }

      // ---------- Section heading ----------
      function SectionLabel({ index, children }) {
        return (
          <div className="flex items-center gap-3 text-xs font-mono tracking-[0.2em] text-ink-300 uppercase">
            <span className="text-brand-violet">{index}</span>
            <span className="h-px w-8 bg-gradient-to-r from-brand-violet/60 to-transparent" />
            <span>{children}</span>
          </div>
        );
      }

      // ---------- Background ----------
      function BackgroundFX() {
        return (
          <div className="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
            <div className="absolute inset-0 grid-bg opacity-60" />
            <div
              className="bg-orb float-slow"
              style={{
                background: "radial-gradient(circle at center, #6366f1, transparent 60%)",
                width: 600,
                height: 600,
                top: "-12%",
                left: "-10%",
              }}
            />
            <div
              className="bg-orb float-slow"
              style={{
                background: "radial-gradient(circle at center, #a855f7, transparent 60%)",
                width: 700,
                height: 700,
                top: "30%",
                right: "-15%",
                animationDelay: "-3s",
              }}
            />
            <div
              className="bg-orb float-slow"
              style={{
                background: "radial-gradient(circle at center, #22d3ee, transparent 60%)",
                width: 500,
                height: 500,
                bottom: "-10%",
                left: "20%",
                animationDelay: "-6s",
                opacity: 0.3,
              }}
            />
            <div
              className="absolute inset-0"
              style={{
                background:
                  "radial-gradient(ellipse at top, transparent 0%, #07070d 75%)",
              }}
            />
          </div>
        );
      }

      // ---------- Nav ----------
      function Nav() {
        const [scrolled, setScrolled] = useState(false);
        const [open, setOpen] = useState(false);
        useEffect(() => {
          const onScroll = () => setScrolled(window.scrollY > 12);
          onScroll();
          window.addEventListener("scroll", onScroll);
          return () => window.removeEventListener("scroll", onScroll);
        }, []);
        const links = [
          ["About", "#about"],
          ["Work", "#work"],
          ["Skills", "#skills"],
          ["Projects", "#projects"],
          ["Contact", "#contact"],
        ];
        return (
          <header
            className={
              "fixed top-0 left-0 right-0 z-50 transition-all duration-500 " +
              (scrolled ? "py-3" : "py-5")
            }
          >
            <div className="mx-auto max-w-6xl px-5">
              <nav
                className={
                  "flex items-center justify-between rounded-full px-4 sm:px-6 py-2.5 transition-all duration-500 " +
                  (scrolled ? "glass-strong shadow-2xl shadow-black/40" : "glass")
                }
              >
                <a href="#top" className="flex items-center gap-2 group">
                  <span className="relative flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-brand-indigo to-brand-violet text-sm font-bold text-white shadow-lg shadow-brand-violet/30">
                    SM
                  </span>
                  <span className="hidden sm:inline font-display font-semibold tracking-tight text-ink-100">
                    Selene<span className="text-brand-violet">.</span>
                  </span>
                </a>
                <ul className="hidden md:flex items-center gap-1 text-sm">
                  {links.map(([label, href]) => (
                    <li key={href}>
                      <a
                        href={href}
                        className="px-3 py-1.5 rounded-full text-ink-200 hover:text-white hover:bg-white/5 transition-colors"
                      >
                        {label}
                      </a>
                    </li>
                  ))}
                </ul>
                <a
                  href="#contact"
                  className="hidden md:inline-flex items-center gap-1.5 rounded-full bg-white text-ink-950 text-sm font-medium px-4 py-1.5 hover:bg-ink-100 transition-colors"
                >
                  Let's talk
                  <Icon name="arrow-up-right" className="text-base" />
                </a>
                <button
                  className="md:hidden p-2 text-ink-100"
                  onClick={() => setOpen((o) => !o)}
                  aria-label="Toggle menu"
                >
                  <Icon name={open ? "x" : "menu"} className="text-xl" />
                </button>
              </nav>
              {open && (
                <div className="md:hidden mt-2 glass rounded-2xl p-3 flex flex-col gap-1">
                  {links.map(([label, href]) => (
                    <a
                      key={href}
                      href={href}
                      onClick={() => setOpen(false)}
                      className="px-4 py-2 rounded-xl text-ink-200 hover:bg-white/5 hover:text-white text-sm"
                    >
                      {label}
                    </a>
                  ))}
                  <a
                    href="#contact"
                    onClick={() => setOpen(false)}
                    className="mt-1 px-4 py-2 rounded-xl bg-white text-ink-950 text-sm font-medium text-center"
                  >
                    Let's talk
                  </a>
                </div>
              )}
            </div>
          </header>
        );
      }

      // ---------- Hero ----------
      function Hero() {
        return (
          <section
            id="top"
            className="relative min-h-screen flex items-center pt-32 pb-20"
          >
            <div className="mx-auto max-w-6xl px-5 w-full relative z-10">
              <div className="grid lg:grid-cols-12 gap-10 items-center">
                <div className="lg:col-span-8 reveal">
                  <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full glass text-xs font-mono text-ink-200 mb-6">
                    <span className="relative flex h-2 w-2">
                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-400"></span>
                    </span>
                    Available for select projects · 2026
                  </div>
                  <h1 className="font-display text-[clamp(3rem,9vw,7.5rem)] leading-[0.95] font-bold tracking-tight">
                    <span className="block text-ink-100">Selene</span>
                    <span className="block">
                      <span className="gradient-text">Mulmi</span>
                      <span className="caret align-baseline" />
                    </span>
                  </h1>
                  <p className="mt-6 max-w-2xl text-lg sm:text-xl text-ink-200 leading-relaxed reveal reveal-d1">
                    UI/UX Designer & CSIT student bridging the gap between{" "}
                    <span className="text-white font-medium">aesthetics</span>{" "}
                    and{" "}
                    <span className="text-white font-medium">functional code</span>.
                    I design interfaces that feel inevitable — and I can build them too.
                  </p>
                  <div className="mt-9 flex flex-wrap gap-3 reveal reveal-d2">
                    <a
                      href="#projects"
                      className="group inline-flex items-center gap-2 rounded-full bg-gradient-to-r from-brand-indigo to-brand-violet px-6 py-3 text-sm font-semibold text-white shadow-lg shadow-brand-violet/25 hover:shadow-brand-violet/40 transition-all hover:-translate-y-0.5"
                    >
                      View my work
                      <Icon name="arrow-down" className="text-base group-hover:translate-y-0.5 transition-transform" />
                    </a>
                    <a
                      href="#contact"
                      className="inline-flex items-center gap-2 rounded-full glass px-6 py-3 text-sm font-semibold text-ink-100 hover:bg-white/10 transition-colors"
                    >
                      <Icon name="mail" className="text-base" />
                      Get in touch
                    </a>
                  </div>
                  <div className="mt-12 flex flex-wrap items-center gap-x-8 gap-y-3 text-sm text-ink-300 reveal reveal-d3">
                    <span className="inline-flex items-center gap-2">
                      <Icon name="map-pin" className="text-brand-violet" />
                      Kupondole, Lalitpur
                    </span>
                    <span className="inline-flex items-center gap-2">
                      <Icon name="briefcase" className="text-brand-violet" />
                      UI/UX @ Xuno
                    </span>
                    <span className="inline-flex items-center gap-2">
                      <Icon name="graduation-cap" className="text-brand-violet" />
                      CSIT, Deerwalk Institute
                    </span>
                  </div>
                </div>
                <div className="lg:col-span-4 reveal reveal-d2">
                  <div className="relative aspect-square max-w-sm mx-auto">
                    <div className="absolute inset-0 rounded-[2.5rem] bg-gradient-to-br from-brand-indigo via-brand-violet to-brand-fuchsia blur-3xl opacity-40" />
                    <div className="relative h-full w-full rounded-[2.5rem] glass-strong gradient-border p-6 flex flex-col justify-between overflow-hidden">
                      <div className="flex items-center justify-between">
                        <span className="text-xs font-mono text-ink-300">// now playing</span>
                        <span className="flex gap-1">
                          <span className="h-2 w-2 rounded-full bg-rose-400/70" />
                          <span className="h-2 w-2 rounded-full bg-amber-300/70" />
                          <span className="h-2 w-2 rounded-full bg-emerald-400/70" />
                        </span>
                      </div>
                      <div>
                        <div className="text-[6rem] leading-none font-display font-bold gradient-text">
                          ✱
                        </div>
                        <div className="mt-3 text-sm text-ink-200">
                          designing for{" "}
                          <span className="text-white font-medium">people</span>,{" "}
                          building with{" "}
                          <span className="text-white font-medium">intention</span>.
                        </div>
                      </div>
                      <div className="flex items-end justify-between">
                        <div>
                          <div className="text-3xl font-display font-bold text-white">5+</div>
                          <div className="text-xs text-ink-300">years designing</div>
                        </div>
                        <div className="text-right">
                          <div className="text-3xl font-display font-bold text-white">10+</div>
                          <div className="text-xs text-ink-300">shipped projects</div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div className="mt-20 hidden lg:flex justify-center reveal reveal-d3">
                <a href="#about" className="text-ink-300 hover:text-ink-100 flex flex-col items-center gap-2 group">
                  <span className="text-xs font-mono tracking-widest">SCROLL</span>
                  <Icon name="chevron-down" className="text-xl group-hover:translate-y-1 transition-transform" />
                </a>
              </div>
            </div>
          </section>
        );
      }

      // ---------- Marquee ----------
      function Marquee() {
        const items = [
          "User research",
          "Visual systems",
          "Figma",
          "Branding",
          "E-commerce",
          "Fintech",
          "Mobile UI",
          "Prototyping",
          "Design systems",
          "Front-end",
        ];
        const row = [...items, ...items];
        return (
          <div className="relative py-8 border-y border-white/5 bg-white/[0.015] overflow-hidden">
            <div className="flex marquee-track whitespace-nowrap gap-12 text-2xl sm:text-3xl font-display font-medium text-ink-300">
              {row.map((t, i) => (
                <span key={i} className="flex items-center gap-12">
                  <span>{t}</span>
                  <span className="text-brand-violet">✦</span>
                </span>
              ))}
            </div>
          </div>
        );
      }

      // ---------- About ----------
      function About() {
        const stats = [
          { v: "3", l: "design roles" },
          { v: "10+", l: "live projects" },
          { v: "2026", l: "CSIT senior" },
        ];
        return (
          <section id="about" className="relative py-28">
            <div className="mx-auto max-w-6xl px-5">
              <div className="grid lg:grid-cols-12 gap-12 lg:gap-16">
                <div className="lg:col-span-5 reveal">
                  <SectionLabel index="01">About</SectionLabel>
                  <h2 className="mt-5 font-display text-4xl sm:text-5xl font-bold leading-tight">
                    A designer with an{" "}
                    <span className="gradient-text">engineer's mindset</span>.
                  </h2>
                </div>
                <div className="lg:col-span-7 space-y-6 text-ink-200 leading-relaxed text-lg reveal reveal-d1">
                  <p>
                    I'm Selene — a 4th-year CSIT student at{" "}
                    <span className="text-white">Deerwalk Institute of Technology</span>{" "}
                    and a UI/UX designer working with teams across e-commerce, fintech, and
                    consumer apps. My background straddles two worlds: I think in user flows
                    and color tokens, but I'm just as comfortable in HTML, CSS, and JavaScript.
                  </p>
                  <p>
                    Right now I'm part of the design team at{" "}
                    <span className="text-white">Xuno</span>, building consistent visual systems
                    and shipping features in Figma. Before that, I freelanced on e-commerce
                    products, ran social and graphic design for a waterpark brand, and kept
                    learning every other weekend.
                  </p>
                  <p>
                    I care about interfaces that feel obvious in hindsight, copy that doesn't
                    waste a word, and design that respects engineering constraints. I'm
                    happiest in the messy middle — the part where research turns into pixels
                    turns into shipped product.
                  </p>
                  <div className="mt-10 grid grid-cols-3 gap-4">
                    {stats.map((s, i) => (
                      <div
                        key={i}
                        className="glass rounded-2xl p-5 text-center"
                      >
                        <div className="text-3xl sm:text-4xl font-display font-bold gradient-text">
                          {s.v}
                        </div>
                        <div className="mt-1 text-xs font-mono uppercase tracking-wider text-ink-300">
                          {s.l}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </section>
        );
      }

      // ---------- Experience ----------
      function Experience() {
        const roles = [
          {
            role: "UI/UX Designer",
            company: "Xuno",
            type: "Part Time",
            location: "Ellensburg, Washington",
            period: "May 2024 — Present",
            current: true,
            bullets: [
              "Creating and maintaining a consistent visual system and brand expression in Figma.",
              "Collaborating with cross-functional teams to ship cohesive UI for the app.",
              "Performing user research and usability testing to inform design decisions.",
            ],
          },
          {
            role: "UI/UX Designer",
            company: "Code Verse Nepal",
            type: "Freelance",
            location: "Kathmandu",
            period: "Mar 2024 — Jun 2024",
            current: false,
            bullets: [
              "Designed an end-to-end e-commerce experience under a contract engagement.",
              "Worked closely with the dev team to deliver a seamless, accessible shopping flow.",
            ],
          },
          {
            role: "Graphic Designer & Social Media Manager",
            company: "Big Splash Waterpark",
            type: "Freelance",
            location: "Pokhara",
            period: "Feb 2021 — Nov 2023",
            current: false,
            bullets: [
              "Coordinated page layouts, banners, and promotional graphics across channels.",
              "Designed in Photoshop, Canva, and Figma; formatted print and digital deliverables in Adobe CS.",
              "Owned multiple social media accounts and produced campaign content end-to-end.",
            ],
          },
        ];
        return (
          <section id="work" className="relative py-28">
            <div className="mx-auto max-w-6xl px-5">
              <div className="reveal">
                <SectionLabel index="02">Experience</SectionLabel>
                <div className="mt-5 flex items-end justify-between flex-wrap gap-4">
                  <h2 className="font-display text-4xl sm:text-5xl font-bold leading-tight max-w-xl">
                    Where I've <span className="gradient-text">designed</span> & shipped.
                  </h2>
                  <p className="text-ink-300 text-sm font-mono">
                    {roles.length} roles · 5+ years
                  </p>
                </div>
              </div>
              <div className="mt-14 space-y-5">
                {roles.map((r, i) => (
                  <article
                    key={i}
                    className="reveal group glass rounded-3xl p-6 sm:p-8 hover:bg-white/[0.06] transition-colors"
