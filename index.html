<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#faf8f3" />
  <title>Selene Mulmi — UI/UX Designer</title>
  <meta name="description"
    content="Portfolio of Selene Mulmi — UI/UX Designer crafting interfaces with care for craft and clarity." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "system-ui", "sans-serif"],
            display: ["Space Grotesk", "Inter", "sans-serif"],
            mono: ["JetBrains Mono", "monospace"],
          },
          colors: {
            cream: {
              50: "#fdfcf8",
              100: "#faf8f3",
              200: "#f3efe6",
            },
            ink: {
              950: "#0a0a0f",
              900: "#14141d",
              800: "#1f1f2b",
              700: "#2c2c3a",
              600: "#404052",
              500: "#5a5a70",
              400: "#7a7a8e",
              300: "#9c9cae",
              200: "#c8c8d2",
              100: "#e6e6ec",
            },
            brand: {
              indigo: "#4f46e5",
              violet: "#9333ea",
              fuchsia: "#c026d3",
              pink: "#ec4899",
              rose: "#f43f5e",
              cyan: "#0891b2",
              peach: "#fb923c",
            },
          },
        },
      },
    };
  </script>
  <style>
    :root {
      --bg: #faf8f3;
    }

    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Inter", system-ui, sans-serif;
      background-color: #faf8f3;
      color: #0a0a0f;
      overflow-x: hidden;
      cursor: default;
    }

    /* ---------- Background ---------- */
    .bg-orb {
      position: absolute;
      border-radius: 9999px;
      filter: blur(140px);
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
    }

    .grid-bg {
      background-image:
        linear-gradient(rgba(15, 15, 30, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 15, 30, 0.045) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse at top, black 30%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at top,
          black 30%,
          transparent 75%);
    }

    /* ---------- Glass cards ---------- */
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border: 1px solid rgba(15, 15, 30, 0.06);
      box-shadow: 0 4px 28px rgba(15, 15, 30, 0.04);
    }

    .glass-strong {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid rgba(15, 15, 30, 0.07);
      box-shadow: 0 14px 50px rgba(15, 15, 30, 0.07);
    }

    /* ---------- Animated gradient text ---------- */
    .gradient-text {
      background: linear-gradient(120deg,
          #4f46e5 0%,
          #9333ea 25%,
          #c026d3 50%,
          #ec4899 75%,
          #f43f5e 100%);
      background-size: 250% 250%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradient-shift 8s ease-in-out infinite;
    }

    @keyframes gradient-shift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    /* ---------- Gradient border ---------- */
    .gradient-border {
      position: relative;
    }

    .gradient-border::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg,
          rgba(147, 51, 234, 0.55),
          rgba(236, 72, 153, 0.35),
          transparent 60%);
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ---------- Bouncy reveal-on-scroll ---------- */
    .reveal {
      opacity: 0;
      transform: translateY(32px) scale(0.985);
      transition:
        opacity 0.9s cubic-bezier(0.2, 0.7, 0.2, 1),
        transform 0.9s cubic-bezier(0.34, 1.42, 0.64, 1);
    }

    .reveal.in {
      opacity: 1;
      transform: none;
    }

    .reveal-d1 {
      transition-delay: 0.08s;
    }

    .reveal-d2 {
      transition-delay: 0.18s;
    }

    .reveal-d3 {
      transition-delay: 0.28s;
    }

    .reveal-d4 {
      transition-delay: 0.4s;
    }

    /* ---------- Card hover lift ---------- */
    .card-lift {
      transition:
        transform 0.5s cubic-bezier(0.2, 0.7, 0.2, 1),
        box-shadow 0.5s ease,
        background-color 0.4s ease;
    }

    .card-lift:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 60px rgba(15, 15, 30, 0.1);
    }

    /* ---------- Float / drift ---------- */
    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-14px);
      }
    }

    .float-slow {
      animation: float 9s ease-in-out infinite;
    }

    @keyframes drift {

      0%,
      100% {
        transform: translate(0, 0) rotate(0);
      }

      33% {
        transform: translate(10px, -14px) rotate(8deg);
      }

      66% {
        transform: translate(-8px, -6px) rotate(-6deg);
      }
    }

    .drift {
      animation: drift 7s ease-in-out infinite;
    }

    /* ---------- Spinning star ---------- */
    @keyframes spin-slow {
      to {
        transform: rotate(360deg);
      }
    }

    .spin-slow {
      animation: spin-slow 22s linear infinite;
      display: inline-block;
      transform-origin: 50% 60%;
    }

    .spin-slow:hover {
      animation-duration: 4s;
    }

    /* ---------- Twinkle ---------- */
    @keyframes twinkle {

      0%,
      100% {
        opacity: 0.3;
        transform: scale(0.8) rotate(0);
      }

      50% {
        opacity: 1;
        transform: scale(1.15) rotate(180deg);
      }
    }

    .twinkle {
      animation: twinkle 3.5s ease-in-out infinite;
    }

    .twinkle-2 {
      animation: twinkle 5s ease-in-out 0.6s infinite;
    }

    .twinkle-3 {
      animation: twinkle 4.2s ease-in-out 1.4s infinite;
    }

    /* ---------- Wobble ---------- */
    @keyframes wobble {

      0%,
      100% {
        transform: rotate(0);
      }

      20% {
        transform: rotate(-10deg);
      }

      40% {
        transform: rotate(8deg);
      }

      60% {
        transform: rotate(-5deg);
      }

      80% {
        transform: rotate(3deg);
      }
    }

    .hover-wobble:hover {
      animation: wobble 0.7s ease-in-out;
    }

    /* ---------- Caret ---------- */
    @keyframes blink {

      0%,
      49% {
        opacity: 1;
      }

      50%,
      100% {
        opacity: 0;
      }
    }

    .caret {
      display: inline-block;
      width: 4px;
      height: 0.9em;
      background: linear-gradient(180deg, #9333ea, #ec4899);
      transform: translateY(2px);
      margin-left: 6px;
      animation: blink 1s steps(1) infinite;
      border-radius: 2px;
    }

    /* ---------- Project cards (tilt + lift) ---------- */
    .project-card {
      transition:
        transform 0.55s cubic-bezier(0.2, 0.7, 0.2, 1),
        box-shadow 0.5s ease;
    }

    .project-card:hover {
      transform: translateY(-8px) rotate(-0.6deg);
      box-shadow: 0 28px 60px rgba(15, 15, 30, 0.18);
    }

    .project-card .project-overlay {
      opacity: 0;
      transform: translateY(8px);
      transition:
        opacity 0.4s ease,
        transform 0.5s cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    .project-card:hover .project-overlay {
      opacity: 1;
      transform: translateY(0);
    }

    .project-card .project-art {
      transition: transform 0.6s cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    .project-card:hover .project-art {
      transform: scale(1.06);
    }

    /* ---------- Tool tile ---------- */
    .tool-tile {
      transition: transform 0.35s cubic-bezier(0.34, 1.45, 0.6, 1);
    }

    .tool-tile:hover {
      transform: translateY(-4px) scale(1.04);
    }

    .tool-tile:hover .tool-icon {
      animation: wobble 0.6s ease-in-out;
    }

    /* ---------- Marquee ---------- */
    @keyframes marquee {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    @keyframes marquee-rev {
      0% {
        transform: translateX(-50%);
      }

      100% {
        transform: translateX(0);
      }
    }

    .marquee-track {
      animation: marquee 28s linear infinite;
    }

    .marquee-track-rev {
      animation: marquee-rev 34s linear infinite;
    }

    /* ---------- Nudge for arrows on CTA hover ---------- */
    .group:hover .nudge {
      transform: translate(3px, -3px);
      transition: transform 0.3s ease;
    }

    /* ---------- Cursor blob ---------- */
    .cursor-blob {
      position: fixed;
      pointer-events: none;
      width: 460px;
      height: 460px;
      border-radius: 9999px;
      background: radial-gradient(circle at center,
          rgba(168, 85, 247, 0.16),
          rgba(236, 72, 153, 0.08) 40%,
          transparent 60%);
      transform: translate(-50%, -50%);
      z-index: 1;
      filter: blur(30px);
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .cursor-blob.on {
      opacity: 1;
    }

    @media (pointer: coarse) {
      .cursor-blob {
        display: none;
      }
    }

    /* ---------- Pulse glow ---------- */
    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(147, 51, 234, 0);
      }

      50% {
        box-shadow: 0 0 36px 0 rgba(147, 51, 234, 0.3);
      }
    }

    .pulse-glow {
      animation: pulse-glow 3s ease-in-out infinite;
    }

    /* ---------- Heart pop ---------- */
    @keyframes heart-pop {

      0%,
      100% {
        transform: scale(1) rotate(-8deg);
      }

      50% {
        transform: scale(1.2) rotate(8deg);
      }
    }

    .heart-pop {
      animation: heart-pop 1.8s ease-in-out infinite;
    }

    /* ---------- Underline draw ---------- */
    .underline-draw {
      background-image: linear-gradient(120deg, #9333ea, #ec4899);
      background-size: 0% 3px;
      background-position: 0 100%;
      background-repeat: no-repeat;
      transition: background-size 0.5s cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    a:hover .underline-draw,
    .group:hover .underline-draw {
      background-size: 100% 3px;
    }

    /* ---------- Scrollbar ---------- */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #faf8f3;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(#d4d4d8, #a1a1aa);
      border-radius: 8px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(#9333ea, #ec4899);
    }

    ::selection {
      background: rgba(147, 51, 234, 0.22);
      color: #0a0a0f;
    }

    [data-lucide] {
      width: 1em;
      height: 1em;
      stroke-width: 1.6;
    }

    /* ---------- Project art animations ---------- */
    .art-bob {
      transform-box: fill-box;
      transform-origin: center;
      animation: art-bob 5s ease-in-out infinite;
    }

    @keyframes art-bob {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-7px);
      }
    }

    .art-pulse {
      transform-box: fill-box;
      transform-origin: center;
      animation: art-pulse 3.5s ease-in-out infinite;
    }

    @keyframes art-pulse {

      0%,
      100% {
        opacity: 0.85;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.07);
      }
    }

    .art-tilt {
      transform-box: fill-box;
      transform-origin: center;
      animation: art-tilt 7s ease-in-out infinite;
    }

    @keyframes art-tilt {

      0%,
      100% {
        transform: rotate(-12deg);
      }

      50% {
        transform: rotate(-3deg);
      }
    }

    .art-sway {
      transform-box: fill-box;
      transform-origin: top center;
      animation: art-sway 4.5s ease-in-out infinite;
    }

    @keyframes art-sway {

      0%,
      100% {
        transform: rotate(-3deg);
      }

      50% {
        transform: rotate(3deg);
      }
    }

    .art-bars rect {
      transform-box: fill-box;
      transform-origin: bottom center;
      animation: art-bar 4s ease-in-out infinite;
    }

    @keyframes art-bar {

      0%,
      100% {
        transform: scaleY(1);
      }

      50% {
        transform: scaleY(0.78);
      }
    }

    .art-bars rect:nth-child(1) {
      animation-delay: 0s;
    }

    .art-bars rect:nth-child(2) {
      animation-delay: 0.2s;
    }

    .art-bars rect:nth-child(3) {
      animation-delay: 0.4s;
    }

    .art-bars rect:nth-child(4) {
      animation-delay: 0.6s;
    }

    .art-bars rect:nth-child(5) {
      animation-delay: 0.8s;
    }

    /* Shrink project illustrations so they read as accents */
    .project-art > div > svg,
    .project-art svg {
      transform: scale(0.7);
      transform-origin: center;
    }

    /* Stickers */
    .sticker {
      position: absolute;
      font-size: 28px;
      line-height: 1;
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.18));
      pointer-events: none;
      user-select: none;
    }

    /* ---------- Reduced motion ---------- */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }

      .reveal {
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useEffect, useRef, useState } = React;

    // ---------- Icon helper (Lucide via UMD) ----------
    function Icon({ name, className = "" }) {
      const ref = useRef(null);
      useEffect(() => {
        if (window.lucide && ref.current) {
          ref.current.innerHTML = "";
          const el = document.createElement("i");
          el.setAttribute("data-lucide", name);
          ref.current.appendChild(el);
          window.lucide.createIcons({ attrs: {} });
        }
      }, [name]);
      return (
        <span
          ref={ref}
          className={"inline-flex items-center justify-center " + className}
          aria-hidden="true"
        />
      );
    }

    // ---------- Reveal-on-scroll hook ----------
    function useReveal() {
      useEffect(() => {
        const els = document.querySelectorAll(".reveal");
        const io = new IntersectionObserver(
          (entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) {
                e.target.classList.add("in");
                io.unobserve(e.target);
              }
            });
          },
          { threshold: 0.12, rootMargin: "0px 0px -40px 0px" }
        );
        els.forEach((el) => io.observe(el));
        return () => io.disconnect();
      }, []);
    }

    // ---------- Counter ----------
    function Counter({ target, suffix = "", className = "" }) {
      const ref = useRef(null);
      const [val, setVal] = useState(0);
      const [done, setDone] = useState(false);
      useEffect(() => {
        if (!ref.current || done) return;
        const io = new IntersectionObserver(
          (entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) {
                setDone(true);
                io.disconnect();
                const start = performance.now();
                const dur = 1500;
                const t = parseInt(target, 10) || 0;
                const tick = (now) => {
                  const p = Math.min(1, (now - start) / dur);
                  const eased = 1 - Math.pow(1 - p, 3);
                  setVal(Math.round(eased * t));
                  if (p < 1) requestAnimationFrame(tick);
                };
                requestAnimationFrame(tick);
              }
            });
          },
          { threshold: 0.4 }
        );
        io.observe(ref.current);
        return () => io.disconnect();
      }, [target, done]);
      return (
        <span ref={ref} className={className}>
          {val}
          {suffix}
        </span>
      );
    }

    // ---------- Sparkle SVG ----------
    function Sparkle({ size = 24, className = "", style = {}, hue = "violet" }) {
      const colors =
        hue === "pink"
          ? ["#ec4899", "#f43f5e"]
          : hue === "indigo"
            ? ["#4f46e5", "#9333ea"]
            : hue === "peach"
              ? ["#fb923c", "#ec4899"]
              : ["#9333ea", "#ec4899"];
      const id = "sg-" + Math.random().toString(36).slice(2, 8);
      return (
        <span
          className={"absolute pointer-events-none " + className}
          style={style}
          aria-hidden="true"
        >
          <svg
            width={size}
            height={size}
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M12 1.5 C 12.7 7.6 14.4 9.3 22.5 12 C 14.4 14.7 12.7 16.4 12 22.5 C 11.3 16.4 9.6 14.7 1.5 12 C 9.6 9.3 11.3 7.6 12 1.5 Z"
              fill={`url(#${id})`}
            />
            <defs>
              <linearGradient id={id} x1="0" y1="0" x2="24" y2="24">
                <stop offset="0%" stopColor={colors[0]} />
                <stop offset="100%" stopColor={colors[1]} />
              </linearGradient>
            </defs>
          </svg>
        </span>
      );
    }

    // ---------- Cursor blob ----------
    function CursorBlob() {
      const ref = useRef(null);
      useEffect(() => {
        const mq = window.matchMedia("(pointer: coarse)");
        if (mq.matches) return;
        const el = ref.current;
        if (!el) return;
        let x = window.innerWidth / 2,
          y = window.innerHeight / 2,
          tx = x,
          ty = y;
        const move = (e) => {
          tx = e.clientX;
          ty = e.clientY;
          el.classList.add("on");
        };
        const leave = () => el.classList.remove("on");
        let raf;
        const tick = () => {
          x += (tx - x) * 0.12;
          y += (ty - y) * 0.12;
          el.style.left = x + "px";
          el.style.top = y + "px";
          raf = requestAnimationFrame(tick);
        };
        window.addEventListener("mousemove", move);
        window.addEventListener("mouseleave", leave);
        raf = requestAnimationFrame(tick);
        return () => {
          cancelAnimationFrame(raf);
          window.removeEventListener("mousemove", move);
          window.removeEventListener("mouseleave", leave);
        };
      }, []);
      return <div ref={ref} className="cursor-blob" />;
    }

    // ---------- Section heading ----------
    function SectionLabel({ index, children }) {
      return (
        <div className="flex items-center gap-3 text-xs font-mono tracking-[0.2em] text-ink-500 uppercase">
          <span className="text-brand-violet">{index}</span>
          <span className="h-px w-8 bg-gradient-to-r from-brand-violet/60 to-transparent" />
          <span>{children}</span>
          <Sparkle
            size={14}
            className="twinkle relative"
            style={{ position: "static", display: "inline-block" }}
          />
        </div>
      );
    }

    // ---------- Background ----------
    function BackgroundFX() {
      return (
        <div className="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
          <div className="absolute inset-0 grid-bg opacity-70" />
          <div
            className="bg-orb float-slow"
            style={{
              background:
                "radial-gradient(circle at center, #c4b5fd, transparent 60%)",
              width: 640,
              height: 640,
              top: "-12%",
              left: "-10%",
            }}
          />
          <div
            className="bg-orb float-slow"
            style={{
              background:
                "radial-gradient(circle at center, #fbcfe8, transparent 60%)",
              width: 720,
              height: 720,
              top: "30%",
              right: "-15%",
              animationDelay: "-3s",
            }}
          />
          <div
            className="bg-orb float-slow"
            style={{
              background:
                "radial-gradient(circle at center, #fde68a, transparent 60%)",
              width: 540,
              height: 540,
              bottom: "-10%",
              left: "20%",
              animationDelay: "-6s",
              opacity: 0.45,
            }}
          />
          <div
            className="absolute inset-0"
            style={{
              background:
                "radial-gradient(ellipse at top, transparent 0%, rgba(250, 248, 243, 0.85) 75%)",
            }}
          />
        </div>
      );
    }

    // ---------- Nav ----------
    function Nav() {
      const [scrolled, setScrolled] = useState(false);
      const [open, setOpen] = useState(false);
      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 12);
        onScroll();
        window.addEventListener("scroll", onScroll);
        return () => window.removeEventListener("scroll", onScroll);
      }, []);
      const links = [
        ["About", "#about"],
        ["Work", "#work"],
        ["Skills", "#skills"],
        ["Projects", "#projects"],
        ["Contact", "#contact"],
      ];
      return (
        <header
          className={
            "fixed top-0 left-0 right-0 z-50 transition-all duration-500 " +
            (scrolled ? "py-3" : "py-5")
          }
        >
          <div className="mx-auto max-w-6xl px-5">
            <nav
              className={
